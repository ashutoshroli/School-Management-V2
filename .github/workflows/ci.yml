name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (typecheck, test, build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            db/package-lock.json
            backend/package-lock.json

      - name: Install db package deps
        working-directory: db
        run: npm ci

      - name: Generate Prisma client
        working-directory: db
        # No live database is needed to generate the client or to
        # typecheck/build - Prisma only needs a syntactically valid
        # DATABASE_URL at generate time, not a reachable one.
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/school_erp?schema=public"
        run: npx prisma generate

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Link generated Prisma client into backend/node_modules
        run: |
          rm -rf backend/node_modules/@prisma/client backend/node_modules/.prisma
          cp -r db/node_modules/@prisma/client backend/node_modules/@prisma/client
          cp -r db/node_modules/.prisma backend/node_modules/.prisma

      - name: Typecheck
        working-directory: backend
        run: npx tsc --noEmit

      - name: Test
        working-directory: backend
        run: npm test -- --ci

      - name: Build
        working-directory: backend
        run: npm run build

  frontend:
    name: Frontend (typecheck, build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          # Dummy values - the build only needs these to be *set*, not
          # to point at a real running backend.
          NEXT_PUBLIC_API_URL: "http://localhost:5000/api"
          NEXT_PUBLIC_APP_NAME: "School ERP"
        run: npm run build
