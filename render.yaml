# Render "Blueprint" for a trial/demo deployment of the backend API.
#
# Usage: Render Dashboard > New > Blueprint > point at this repo. Render
# will read this file and create the service below automatically. You
# still need to set the *secret* env vars (marked sync: false) manually
# in the Render dashboard after the service is created - see
# DEPLOY.md for the full list and where to get each value.
#
# This does NOT provision a database - use a free Neon/Supabase Postgres
# instance (see DEPLOY.md) and paste its connection string into
# DATABASE_URL.
#
# runtime: docker (instead of the plain Node runtime used previously)
# so LibreOffice can be installed via backend/Dockerfile's `apt-get
# install libreoffice` - needed for the Templates page's uploaded .docx
# certificate/document templates to actually be converted to PDF (see
# backend/src/services/docxToPdf.service.ts). This works on Render's
# FREE tier with no Shell/SSH access required: the package install runs
# automatically as part of Render's own Docker build step, not
# something you run yourself after deploying. Without this, the app
# still works fine - every generator falls back to its built-in PDFKit
# layout - it just never actually uses an uploaded template's design.
services:
  - type: web
    name: school-erp-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Render sets its own PORT env var automatically for web services -
      # config/index.ts already reads process.env.PORT, so nothing to
      # configure here.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE
        value: "10485760"
      # ROOT CAUSE NOTE: on Render's FREE plan (this blueprint's `plan:
      # free` above), the container has NO persistent disk - Render
      # doesn't support attaching one on this plan at all. UPLOAD_DIR
      # above is a plain path inside the container's own filesystem, so
      # every uploaded file written there via storage.service.ts's
      # LocalStorageProvider is WIPED the moment this service redeploys
      # OR spins back up after its free-tier inactivity sleep (~15 min).
      # The database row referencing that file (e.g.
      # ExamQuestionPaper.fileUrl) survives fine in Postgres - only the
      # file's actual bytes disappear - which is exactly why an upload
      # can succeed and show up in a list, then 404 on download shortly
      # after. Local disk storage on this plan is fundamentally
      # incompatible with persisting files across restarts, no matter
      # what changes are made to the application code.
      #
      # Fix: set STORAGE_PROVIDER to "s3" (generic S3-compatible bucket)
      # or "r2" (Cloudflare R2 specifically - see the R2_* block below)
      # and fill in real credentials in the Render dashboard
      # (Environment tab for this service) - storage.service.ts already
      # picks this up automatically via its existing S3StorageProvider/
      # R2StorageProvider (backend/src/services/storage/s3Provider.ts,
      # r2Provider.ts), no further code changes needed. Leaving these
      # blank keeps today's exact behavior (falls back to local disk -
      # see storage.service.ts's getStorageProvider()). Alternatively,
      # upgrade this service to a paid Render plan and attach a
      # persistent disk mounted at UPLOAD_DIR instead of using object
      # storage.
      - key: STORAGE_PROVIDER
        value: local
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: us-east-1
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      # Cloudflare R2 - use these instead of the generic S3_* block
      # above when STORAGE_PROVIDER=r2 (keeps R2 credentials separate
      # from a possibly-different S3-compatible provider's config) -
      # see backend/src/config/r2.ts and .env.example for where to get
      # each value from the Cloudflare dashboard.
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: R2_REGION
        value: auto
