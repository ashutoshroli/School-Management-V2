<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - School ERP</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; color: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; padding: 24px; }
    .box { max-width: 420px; }
    h1 { font-size: 1.25rem; margin-bottom: 8px; }
    p { color: #64748b; font-size: 0.95rem; }
    button { margin-top: 16px; padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
  </style>
</head>
<body>
  <div class="box">
    <h1>You're offline</h1>
    <p>School ERP needs an internet connection to show live attendance, fees, and exam data. Please reconnect and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
